<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ANDASHI-DROP — Offline</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        :root{--bg:#030810;--surface:#080f1e;--border:rgba(0,180,255,0.08);--accent:#00b4ff;--accent2:#00e5ff;--accent3:#00ffd4;--text:#e8f4ff;--text-muted:#3a6080;--text-dim:#7ab0cc;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(0,120,200,0.12) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(0,229,255,0.06) 0%,transparent 60%);pointer-events:none;}
        .card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 40px;max-width:420px;width:100%;animation:fade-up 0.6s cubic-bezier(0.16,1,0.3,1) both;}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,255,0.25),transparent);border-radius:24px 24px 0 0;}
        .logo{width:72px;height:72px;object-fit:contain;margin:0 auto 24px;display:block;filter:drop-shadow(0 0 16px rgba(0,180,255,0.5)) drop-shadow(0 0 40px rgba(0,229,255,0.25));animation:pulse 3s ease-in-out infinite;}
        @keyframes pulse{0%,100%{filter:drop-shadow(0 0 16px rgba(0,180,255,0.5)) drop-shadow(0 0 40px rgba(0,229,255,0.25));}50%{filter:drop-shadow(0 0 26px rgba(0,180,255,0.9)) drop-shadow(0 0 60px rgba(0,229,255,0.5));}}
        .brand{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:1px;margin-bottom:8px;}
        .product{background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .signal{font-size:56px;margin:28px 0 16px;display:block;animation:float 3s ease-in-out infinite;}
        @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
        h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:12px;}
        p{font-size:14px;color:var(--text-dim);line-height:1.7;margin-bottom:32px;}
        .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 20px;background:linear-gradient(135deg,#0080cc,var(--accent),var(--accent2));color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(0,180,255,0.3);transition:all 0.2s;text-decoration:none;}
        .btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,180,255,0.5);}
        .status{margin-top:24px;font-size:12px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:6px;}
        .dot{width:6px;height:6px;border-radius:50%;background:#ff6b7a;animation:blink 1.5s ease-in-out infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
        @keyframes fade-up{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    </style>
</head>
<body>
<div class="card">
    <img class="logo" src="/img/my_logo2.png" alt="ANDASHI" onerror="this.style.display='none'"/>
    <div class="brand">ANDASHI<span style="color:var(--text-muted)">-</span><span class="product">DROP</span></div>
    <span class="signal">📡</span>
    <h1>You're Offline</h1>
    <p>ANDASHI-DROP needs an internet connection to transfer files. Please check your connection and try again.</p>
    <a class="btn" href="/" onclick="window.location.reload();return false;">↻ &nbsp;Try Again</a>
    <div class="status"><div class="dot"></div>No connection detected</div>
</div>
<script>window.addEventListener("online",()=>{window.location.href="/"});</script>
</body>
</html>
